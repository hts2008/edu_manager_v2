# Docker Compose for EDU Manager
# VI: Chỉ dùng cho production deployment, không ảnh hưởng đến local development

services:
  backend:
    build: ./backend
    container_name: edu-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-edumanager_secret_key_2024}
      - JWT_EXPIRES_IN=24h
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - edu-network

  frontend:
    build: ./frontend
    container_name: edu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - edu-network

volumes:
  backend-data:
    name: edu-manager-data
  backend-uploads:
    name: edu-manager-uploads

networks:
  edu-network:
    driver: bridge
