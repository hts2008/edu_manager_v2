name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm install --include=optional --no-audit --no-fund
        working-directory: frontend
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm run test:unit
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run lint -- --max-warnings=0
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --include=optional --no-audit --no-fund
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Start frontend preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 3000 > ../smoke.log 2>&1 &
          echo $! > smoke.pid
          for i in {1..30}; do
            if curl -fsS "$E2E_BASE_URL" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../smoke.log
          exit 1
        working-directory: frontend
      - run: npm run test:e2e -- advanced-reports-chart.spec.js report-bi.spec.js template-designer-hardening.spec.js --project=chromium --reporter=list
        working-directory: frontend
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            smoke.log
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edu_manager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edu_manager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edu_manager_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edu_manager_test
      JWT_SECRET: ci-only-router-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npm run test:integration
