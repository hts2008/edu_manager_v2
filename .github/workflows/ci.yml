name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm install --include=optional --no-audit --no-fund
        working-directory: frontend
      - run: npm audit --audit-level=high
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm run test:unit
      - run: npm run test:unit
        working-directory: frontend
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run lint -- --max-warnings=0
        working-directory: frontend

  visual-e2e:
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --include=optional --no-audit --no-fund
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Start frontend preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 3000 > ../smoke.log 2>&1 &
          echo $! > smoke.pid
          for i in {1..30}; do
            if curl -fsS "$E2E_BASE_URL" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../smoke.log
          exit 1
        working-directory: frontend
      - run: npm run test:e2e -- advanced-reports-chart.spec.js report-bi.spec.js template-designer-hardening.spec.js --project=chromium --reporter=list
        working-directory: frontend
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            smoke.log
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore

  real-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edu_manager_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edu_manager_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edu_manager_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/edu_manager_e2e
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_ADMIN_USERNAME: admin
      E2E_ADMIN_PASSWORD: ci-aud-rm-009-password
      BOOTSTRAP_ADMIN_PASSWORD: ci-aud-rm-009-password
      JWT_SECRET: ci-only-real-e2e-router-secret-at-least-32-characters
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm install --include=optional --no-audit --no-fund
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npx prisma migrate deploy
      - run: npx prisma migrate status
      - run: npm run test:e2e:fixture
      - run: npm run build
      - name: Start production frontend and real API router
        run: |
          npm run dev:smoke > real-e2e.log 2>&1 &
          echo $! > real-e2e.pid
          for i in {1..30}; do
            root_status=$(curl -sS -o /dev/null -w '%{http_code}' "$E2E_BASE_URL/" || true)
            me_status=$(curl -sS -o /dev/null -w '%{http_code}' "$E2E_BASE_URL/api/auth/me" || true)
            if [ "$root_status" = "200" ] && [ "$me_status" = "401" ]; then
              exit 0
            fi
            sleep 2
          done
          cat real-e2e.log
          exit 1
      - run: npm run test:e2e:real
      - name: Upload real E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-router-postgres-e2e-artifacts
          path: |
            real-e2e.log
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edu_manager_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edu_manager_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edu_manager_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/edu_manager_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edu_manager_test
      JWT_SECRET: ci-only-router-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma migrate status
      - run: npm run test:integration:real
