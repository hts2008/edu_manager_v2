name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: frontend
      - run: npm run test:unit
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run lint -- --max-warnings=0
        working-directory: frontend
